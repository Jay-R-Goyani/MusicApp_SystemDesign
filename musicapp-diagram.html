<style>
  :root{
    /* paper + ink */
    --paper:        #f3e9d2;
    --paper-soft:   #fffdf5;
    --ink:          #1f1c17;
    --ink-2:        #3d3528;
    --muted:        #8a7a55;

    /* visibility (UML) */
    --vis-pub:      #3f7a3a;
    --vis-prv:      #a23b2e;
    --vis-pkg:      #b06a1a;
    --vis-pro:      #6a5410;

    /* group accents — match the pattern-frame colors in the JS */
    --g-domain:     #6b3d1a;
    --g-entry:      #3f4a78;
    --g-facade:     #7a611a;
    --g-repo:       #6b2e16;
    --g-service:    #6b2c4a;
    --g-observer:   #4d3367;
    --g-strategy:   #36531e;
    --g-adapter:    #234862;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }

  body{
    font-family:"Kalam", cursive;
    color:var(--ink);
    background:
      radial-gradient(1200px 800px at 10% -10%, #faf2dd 0%, transparent 60%),
      radial-gradient(900px 700px at 90% 110%, #ecdcb6 0%, transparent 50%),
      var(--paper);
    min-height:100vh;
  }
  /* faint paper grain */
  body::before{
    content:""; position:fixed; inset:0;
    pointer-events:none; z-index:0;
    opacity:.32;
    background-image:
      radial-gradient(rgba(70,50,20,.10) 1px, transparent 1px),
      radial-gradient(rgba(70,50,20,.05) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    mix-blend-mode:multiply;
  }

  /* ───── page chrome ───── */
  header.page{
    position:relative; z-index:2;
    padding:30px 40px 6px;
  }
  header.page h1{
    margin:0;
    font-family:"Kalam"; font-weight:700;
    font-size:46px; letter-spacing:.5px;
    line-height:1;
  }
  header.page h1 .dot{ color:var(--g-facade); }
  header.page .crumbs{
    color:var(--muted); font-size:19px; margin-top:4px;
  }
  .legend{
    margin:14px 0 4px;
    display:flex; flex-wrap:wrap; gap:10px 22px;
    font-size:16px;
  }
  .legend .item{
    display:inline-flex; align-items:center; gap:8px;
    color:var(--ink-2);
  }
  .legend .swatch{
    display:inline-block;
    width:18px; height:14px;
    border:2px dashed currentColor;
    border-radius:4px;
    transform:rotate(-3deg);
  }
  .legend .item.dom { color:var(--g-domain); }
  .legend .item.rep { color:var(--g-repo); }
  .legend .item.svc { color:var(--g-service); }
  .legend .item.fac { color:var(--g-facade); }
  .legend .item.obs { color:var(--g-observer); }
  .legend .item.str { color:var(--g-strategy); }
  .legend .item.adp { color:var(--g-adapter); }

  /* ───── workboard ───── */
  .stage{
    position:relative; z-index:1;
    width:max-content;
    padding: 18px 40px 80px;
  }
  #canvas{
    position:relative;
    width:2640px; height:2040px;
  }
  #lines{
    position:absolute; inset:0;
    width:100%; height:100%;
    pointer-events:none;
    overflow:visible;
    z-index:2;
  }

  /* ───── pattern frames (background regions) ───── */
  .frame{
    position:absolute; z-index:1;
    border:2px dashed;
    border-radius:18px;
    background:rgba(255,253,240,.32);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.5);
  }
  .frame .label{
    position:absolute;
    top:-15px; left:22px;
    background:var(--paper);
    padding:0 10px;
    font-family:"Kalam"; font-weight:700; font-size:21px;
    letter-spacing:.4px;
    transform:rotate(-1.4deg);
  }
  .frame .label .sub{
    font-weight:400; font-size:16px;
    color:var(--muted);
    margin-left:6px;
  }

  /* ───── class boxes ───── */
  .cls{
    position:absolute; z-index:3;
    background:var(--paper-soft);
    border:2px solid var(--ink);
    border-radius:11px 14px 9px 13px;
    box-shadow:
      3px 4px 0 rgba(31,28,23,.18),
      0 14px 22px -12px rgba(31,28,23,.45);
    padding:10px 14px 12px;
    overflow:hidden;
  }
  /* sketchnote tilts */
  .cls.tilt-l{ transform:rotate(-0.85deg); }
  .cls.tilt-r{ transform:rotate( 0.85deg); }
  .cls.tilt-z{ transform:rotate(-0.20deg); }

  /* interface differentiation — striped paper, dashed border */
  .cls.iface{
    background: repeating-linear-gradient(135deg,
      var(--paper-soft) 0 14px,
      #f6ecd0          14px 16px);
    border-style:dashed;
  }

  /* group accent stripe along the top edge */
  .cls::before{
    content:""; position:absolute;
    left:8px; right:8px; top:0; height:5px;
    border-radius:0 0 4px 4px;
    background:var(--accent, #888);
    opacity:.9;
  }
  .cls.g-domain  { --accent:var(--g-domain);   }
  .cls.g-entry   { --accent:var(--g-entry);    }
  .cls.g-facade  { --accent:var(--g-facade);   }
  .cls.g-repo    { --accent:var(--g-repo);     }
  .cls.g-service { --accent:var(--g-service);  }
  .cls.g-observer{ --accent:var(--g-observer); }
  .cls.g-strategy{ --accent:var(--g-strategy); }
  .cls.g-adapter { --accent:var(--g-adapter);  }

  /* head */
  .cls .head{
    position:relative;
    padding:5px 0 7px;
    margin-bottom:6px;
    border-bottom:1.5px dashed rgba(31,28,23,.32);
  }
  .cls .head .stereo{
    font-family:"Kalam";
    font-size:13px;
    color:var(--muted);
    font-style:italic;
    margin-bottom:1px;
    line-height:1.1;
  }
  .cls .head .name{
    font-family:"Kalam"; font-weight:700;
    font-size:23px; line-height:1.05;
    letter-spacing:.3px;
  }
  .cls.iface .head .name{ font-style:italic; }

  /* pattern badge */
  .cls .tag{
    position:absolute;
    top:2px; right:-2px;
    transform:rotate(3.5deg);
    background:var(--accent, #444);
    color:#fffdf5;
    font-family:"Kalam"; font-weight:700;
    font-size:11px; letter-spacing:1.4px;
    padding:2px 8px; border-radius:4px;
    box-shadow:1px 2px 0 rgba(0,0,0,.22);
  }

  /* sections */
  .cls .section{ padding:3px 0; }
  .cls .section + .section{
    border-top:1.5px dashed rgba(31,28,23,.32);
    margin-top:4px;
    padding-top:6px;
  }

  /* rows */
  .cls .row{
    font-family:"JetBrains Mono", monospace;
    font-size:12.5px; line-height:1.6;
    color:var(--ink-2);
    white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
  }
  .cls .row.static{
    text-decoration: underline dotted rgba(31,28,23,.45);
    text-underline-offset:2px;
  }
  .cls .row .vis{
    display:inline-block;
    width:12px;
    font-weight:700;
    color:var(--muted);
  }
  .cls .row .vis.v-pub{ color:var(--vis-pub); }
  .cls .row .vis.v-prv{ color:var(--vis-prv); }
  .cls .row .vis.v-pkg{ color:var(--vis-pkg); }
  .cls .row .vis.v-pro{ color:var(--vis-pro); }
  .cls .row .ty{ color:var(--muted); }
  .cls .empty{
    font-family:"Kalam"; font-style:italic;
    font-size:13.5px; color:var(--muted);
    padding:2px 0;
  }

  /* ───── relationship labels ───── */
  .rel-label{
    position:absolute; z-index:4;
    transform:translate(-50%,-50%) rotate(-2deg);
    background:var(--paper-soft);
    border:1.5px solid var(--ink);
    border-radius:14px;
    padding:1px 9px;
    font-family:"Kalam"; font-size:14px;
    box-shadow:1px 2px 0 rgba(0,0,0,.18);
    white-space:nowrap;
  }

  /* ───── sticky notes ───── */
  .note{
    position:absolute; z-index:5;
    background:#fff3a8;
    color:#3a2f10;
    border:1px solid rgba(80,60,10,.25);
    padding:11px 13px 12px;
    font-family:"Kalam"; font-size:16px; line-height:1.28;
    box-shadow:
      2px 4px 0 rgba(0,0,0,.12),
      6px 12px 22px -8px rgba(60,40,0,.45);
    transform:rotate(-2.2deg);
    border-radius:2px 6px 3px 8px;
    max-width:260px;
  }
  .note::before{
    content:""; position:absolute;
    left:50%; top:-9px;
    transform:translateX(-50%) rotate(-4deg);
    width:64px; height:14px;
    background:rgba(180,140,40,.55);
    border-radius:2px;
    box-shadow:0 2px 3px rgba(0,0,0,.22);
  }

  footer.foot{
    position:relative; z-index:2;
    padding: 8px 40px 32px;
    color:var(--muted);
    font-size:14px;
  }
</style>
</head>

const canvas = document.getElementById('canvas');
const svg = document.getElementById('lines');

/* --- Frames first (background layer) --- */
frames.forEach(f => {
  const el = document.createElement('div');
  el.className = 'frame';
  el.style.left = f.x + 'px';
  el.style.top = f.y + 'px';
  el.style.width = f.w + 'px';
  el.style.height = f.h + 'px';
  el.style.borderColor = f.color + '55';
  el.innerHTML = `<span class="label" style="color:${f.color}">${f.label}<span class="sub">— ${f.sub}</span></span>`;
  canvas.appendChild(el);
});

/* --- Class boxes --- */
const positions = {};
classes.forEach(c => {
  const el = document.createElement('div');
  el.className = `cls g-${c.group} ${c.tilt || ''} ${c.iface ? 'iface' : ''}`;
  el.style.left = c.x + 'px';
  el.style.top = c.y + 'px';
  el.style.width = c.w + 'px';
  el.dataset.id = c.id;

  const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  const tagHtml = c.tag ? `<span class="tag">${esc(c.tag)}</span>` : '';
  const stereoHtml = c.stereo ? `<div class="stereo">${esc(c.stereo)}</div>` : '';
  const fieldRows = (c.fields && c.fields.length)
    ? c.fields.map(f => `<div class="row${f.s ? ' static' : ''}"><span class="vis">${esc(f.v)}</span>${esc(f.n)}${f.t ? ` <span class="ty">: ${esc(f.t)}</span>` : ''}</div>`).join('')
    : '<div class="empty">— no fields —</div>';
  const methodRows = (c.methods && c.methods.length)
    ? c.methods.map(m => `<div class="row${m.s ? ' static' : ''}"><span class="vis">${esc(m.v)}</span>${esc(m.n)}(${esc(m.a || '')})${m.t ? ` <span class="ty">: ${esc(m.t)}</span>` : ''}</div>`).join('')
    : '';

  el.innerHTML = `
    <div class="head">${tagHtml}${stereoHtml}<div class="name">${esc(c.name)}</div></div>
    ${(c.fields && c.fields.length) || !c.methods.length ? `<div class="section">${fieldRows}</div>` : ''}
    ${methodRows ? `<div class="section">${methodRows}</div>` : ''}
  `;
  canvas.appendChild(el);
});

/* --- Measure boxes after layout --- */
function init() {
  classes.forEach(c => {
    const el = canvas.querySelector(`[data-id="${c.id}"]`);
    if (!el) return;
    positions[c.id] = {
      x: el.offsetLeft, y: el.offsetTop,
      w: el.offsetWidth, h: el.offsetHeight,
    };
  });
  colorVisibility();
  drawLines();
  placeNotes();
}

if (document.readyState === 'complete' || document.readyState === 'interactive') {
  waitForRough(init);
} else {
  window.addEventListener('DOMContentLoaded', () => waitForRough(init));
}

/* Poll briefly until rough.js is on window, then run cb.
   Keeps the rest of the script unchanged. */
function waitForRough(cb, tries = 0) {
  if (typeof rough !== 'undefined') { setTimeout(cb, 60); return; }
  if (tries > 80) {                                  // ~8s max
    console.error('rough.js failed to load from both CDNs');
    document.body.insertAdjacentHTML('afterbegin',
      '<div style="background:#a23b2e;color:#fff;padding:14px 20px;font:16px Kalam,cursive;">' +
      'Could not load rough.js — relationship lines will not render. ' +
      'Check network access to unpkg.com / jsdelivr.net.</div>');
    return;
  }
  setTimeout(() => waitForRough(cb, tries + 1), 100);
}

/* Color the +/-/~ markers (UML convention) */
function colorVisibility(){
  document.querySelectorAll('.cls .row .vis').forEach(el => {
    const v = (el.textContent || '').trim();
    if (v === '+') el.classList.add('v-pub');
    else if (v === '-') el.classList.add('v-prv');
    else if (v === '~') el.classList.add('v-pkg');
    else if (v === '#') el.classList.add('v-pro');
  });
}

function anchorPoint(box, side) {
  switch (side) {
    case 'top':    return { x: box.x + box.w / 2, y: box.y - 6 };
    case 'bottom': return { x: box.x + box.w / 2, y: box.y + box.h + 6 };
    case 'left':   return { x: box.x - 6,         y: box.y + box.h / 2 };
    case 'right':  return { x: box.x + box.w + 6, y: box.y + box.h / 2 };
  }
}

/* --- rough.js drawing of relationships --- */
function drawLines() {
  const rc = rough.svg(svg, { options: { roughness: 1.2, bowing: 1.5, seed: 7 } });
  svg.innerHTML = '';

  relations.forEach((rel, idx) => {
    const a = positions[rel.from];
    const b = positions[rel.to];
    if (!a || !b) {
      console.warn('Missing position:', rel.from, rel.to);
      return;
    }
    const [sA, sB] = rel.side;
    const p1 = anchorPoint(a, sA);
    const p2 = anchorPoint(b, sB);

    const pull = 28;
    const c1 = { x: p1.x, y: p1.y };
    const c2 = { x: p2.x, y: p2.y };
    if (sA === 'top')    c1.y -= pull;
    if (sA === 'bottom') c1.y += pull;
    if (sA === 'left')   c1.x -= pull;
    if (sA === 'right')  c1.x += pull;
    if (sB === 'top')    c2.y -= pull;
    if (sB === 'bottom') c2.y += pull;
    if (sB === 'left')   c2.x -= pull;
    if (sB === 'right')  c2.x += pull;

    const dashed = (rel.type === 'realize' || rel.type === 'uses');
    const stroke = '#1f1c17';

    const pathData = `M ${p1.x} ${p1.y} L ${c1.x} ${c1.y} L ${c2.x} ${c2.y} L ${p2.x} ${p2.y}`;

    const opt = {
      stroke,
      strokeWidth: 2,
      roughness: 1.4,
      bowing: 1.0,
      seed: 100 + idx,
    };
    if (dashed) {
      opt.strokeLineDash = rel.type === 'realize' ? [8, 6] : [3, 5];
    }
    const node = rc.path(pathData, opt);
    svg.appendChild(node);

    drawDecoration(rc, p2, sB, rel.type, idx);
    if (rel.type === 'compose' || rel.type === 'aggreg') {
      drawDiamond(rc, p1, sA, rel.type === 'compose', idx);
    }

    if (rel.label) {
      const mx = (c1.x + c2.x) / 2;
      const my = (c1.y + c2.y) / 2;
      const lbl = document.createElement('div');
      lbl.className = 'rel-label';
      lbl.style.left = mx + 'px';
      lbl.style.top = my + 'px';
      lbl.textContent = rel.label;
      canvas.appendChild(lbl);
    }
  });
}

function drawDecoration(rc, p, side, type, seed) {
  if (type === 'compose' || type === 'aggreg') return;

  const size = 12;
  let dx = 0, dy = 0;
  if (side === 'top')    { dy = -1; }
  if (side === 'bottom') { dy = 1; }
  if (side === 'left')   { dx = -1; }
  if (side === 'right')  { dx = 1; }
  const tipX = p.x;
  const tipY = p.y;
  const perpX = -dy, perpY = dx;
  const baseX = tipX + dx * size;
  const baseY = tipY + dy * size;
  const wing1 = { x: baseX + perpX * (size * 0.55), y: baseY + perpY * (size * 0.55) };
  const wing2 = { x: baseX - perpX * (size * 0.55), y: baseY - perpY * (size * 0.55) };

  if (type === 'realize' || type === 'extends') {
    const poly = `M ${tipX} ${tipY} L ${wing1.x} ${wing1.y} L ${wing2.x} ${wing2.y} Z`;
    const node = rc.path(poly, {
      stroke: '#1f1c17', strokeWidth: 2, fill: '#fffdf5', fillStyle: 'solid',
      roughness: 1.1, seed: 200 + seed,
    });
    svg.appendChild(node);
  } else if (type === 'uses') {
    const poly = `M ${tipX} ${tipY} L ${wing1.x} ${wing1.y} L ${wing2.x} ${wing2.y} Z`;
    const node = rc.path(poly, {
      stroke: '#1f1c17', strokeWidth: 2, fill: '#1f1c17', fillStyle: 'solid',
      roughness: 1.0, seed: 300 + seed,
    });
    svg.appendChild(node);
  }
}

function drawDiamond(rc, p, side, filled, seed) {
  const size = 10;
  let dx = 0, dy = 0;
  if (side === 'top')    { dy = -1; }
  if (side === 'bottom') { dy =  1; }
  if (side === 'left')   { dx = -1; }
  if (side === 'right')  { dx =  1; }
  const tipX = p.x;
  const tipY = p.y;
  const farX = tipX + dx * size * 2;
  const farY = tipY + dy * size * 2;
  const perpX = -dy, perpY = dx;
  const sideX = (tipX + farX) / 2;
  const sideY = (tipY + farY) / 2;
  const s1 = { x: sideX + perpX * size * 0.8, y: sideY + perpY * size * 0.8 };
  const s2 = { x: sideX - perpX * size * 0.8, y: sideY - perpY * size * 0.8 };
  const poly = `M ${tipX} ${tipY} L ${s1.x} ${s1.y} L ${farX} ${farY} L ${s2.x} ${s2.y} Z`;
  const node = rc.path(poly, {
    stroke: '#1f1c17',
    strokeWidth: 2,
    fill: filled ? '#1f1c17' : '#fffdf5',
    fillStyle: 'solid',
    roughness: 1.0,
    seed: 400 + seed,
  });
  svg.appendChild(node);
}

function placeNotes() {
  notes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'note';
    el.style.left = n.x + 'px';
    el.style.top = n.y + 'px';
    if (n.w) el.style.width = n.w + 'px';
    el.textContent = n.text;
    canvas.appendChild(el);
  });
}
